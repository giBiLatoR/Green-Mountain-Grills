<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="Auto-Cook closed-loop controller">
<style>.title{font:900 32px Inter,Segoe UI,Arial;fill:#f8fafc}.h{font:900 18px Inter,Segoe UI,Arial;fill:#dcfce7}.s{font:600 14px Inter,Segoe UI,Arial;fill:#bbf7d0}.node{fill:#10251a;stroke:#3f7a43;stroke-width:2}.runner{animation:runner 7s linear infinite}@keyframes runner{0%{offset-distance:0%}100%{offset-distance:100%}}.curve{stroke-dasharray:430;animation:draw 5s ease-in-out infinite}@keyframes draw{0%{stroke-dashoffset:430}45%,70%{stroke-dashoffset:0}100%{stroke-dashoffset:-430}}</style>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#04110a"/><stop offset="1" stop-color="#281407"/></linearGradient></defs>
<rect width="1100" height="500" rx="30" fill="url(#bg)"/><text x="48" y="60" class="title">Auto-Cook: from dinner time to pit nudges</text><text x="50" y="88" class="s">A projection curve is calculated at the start, then probe feedback keeps the cook on pace with small rate-limited changes.</text>
<path d="M177 254 C175 130 316 93 550 94 C784 94 924 130 922 254 C920 379 776 415 550 410 C324 415 180 379 177 254 Z" fill="none" stroke="#86efac" stroke-width="3" opacity=".25" stroke-dasharray="14 12"/>
<g class="runner" style="offset-path:path('M178 254 C176 130 316 93 550 94 C784 94 924 130 922 254 C920 379 776 415 550 410 C324 415 180 379 178 254 Z')"><circle r="10" fill="#f97316"/><circle r="18" fill="#f97316" opacity=".2"/></g>
<g transform="translate(70 195)"><rect width="180" height="92" rx="20" class="node"/><text x="24" y="34" class="h">1. Plan</text><text x="24" y="61" class="s">meat + weight</text><text x="24" y="80" class="s">ready-to-serve time</text></g>
<g transform="translate(310 45)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">2. Pre-flight</text><text x="24" y="61" class="s">probe, bounds, max</text><text x="24" y="80" class="s">cook-time warnings</text></g>
<g transform="translate(610 45)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">3. Preheat</text><text x="24" y="61" class="s">calculated pit</text><text x="24" y="80" class="s">setpoint clamp</text></g>
<g transform="translate(850 195)"><rect width="180" height="92" rx="20" class="node"/><text x="24" y="34" class="h">4. Meat on</text><text x="24" y="61" class="s">probe-temp drop</text><text x="24" y="80" class="s">or manual override</text></g>
<g transform="translate(610 350)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">5. Control</text><text x="24" y="61" class="s">actual vs expected</text><text x="24" y="80" class="s">rate-limited nudges</text></g>
<g transform="translate(310 350)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">6. Pull</text><text x="24" y="61" class="s">notify at pull temp</text><text x="24" y="80" class="s">never auto-off</text></g>
<g transform="translate(392 185)"><rect width="315" height="140" rx="24" fill="#08130f" stroke="#31543a"/><text x="25" y="35" class="h">Projection curve</text><path d="M26 108 C83 111 105 90 142 83 S201 70 285 35" fill="none" stroke="#86efac" stroke-width="5" opacity=".22"/><path class="curve" d="M26 108 C83 111 105 90 142 83 S201 70 285 35" fill="none" stroke="#86efac" stroke-width="4" stroke-linecap="round"/><circle cx="142" cy="83" r="7" fill="#f97316"/><text x="25" y="128" class="s">Food actual tracks expected over time</text></g>
</svg>
