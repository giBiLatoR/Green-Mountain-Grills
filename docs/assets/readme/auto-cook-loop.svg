<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Auto-Cook closed-loop controller">
<style>.title{font:900 32px Inter,Segoe UI,Arial;fill:#f8fafc}.h{font:900 18px Inter,Segoe UI,Arial;fill:#dcfce7}.s{font:600 14px Inter,Segoe UI,Arial;fill:#bbf7d0}.node{fill:#10251a;stroke:#3f7a43;stroke-width:2}.runner{animation:runner 7s linear infinite}@keyframes runner{0%{offset-distance:0%}100%{offset-distance:100%}}.curve{stroke-dasharray:430;animation:draw 5s ease-in-out infinite}@keyframes draw{0%{stroke-dashoffset:430}45%,70%{stroke-dashoffset:0}100%{stroke-dashoffset:-430}}</style>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#04110a"/><stop offset="1" stop-color="#281407"/></linearGradient><path id="loop" d="M178 305 C176 182 316 145 550 146 C784 146 924 182 922 305 C920 430 776 468 550 462 C324 468 180 430 178 305 Z"/></defs>
<rect width="1100" height="560" rx="30" fill="url(#bg)"/>
<text x="48" y="58" class="title">Auto-Cook system: plan, track, nudge</text>
<text x="50" y="88" class="s">A projection curve is calculated at the start, then probe feedback keeps the cook on pace with small rate-limited changes.</text>

<path d="M178 305 C176 182 316 145 550 146 C784 146 924 182 922 305 C920 430 776 468 550 462 C324 468 180 430 178 305 Z" fill="none" stroke="#86efac" stroke-width="3" opacity=".25" stroke-dasharray="14 12"/>
<g class="runner" style="offset-path:path('M178 305 C176 182 316 145 550 146 C784 146 924 182 922 305 C920 430 776 468 550 462 C324 468 180 430 178 305 Z')"><circle r="10" fill="#f97316"/><circle r="18" fill="#f97316" opacity=".2"/></g>

<g transform="translate(70 250)"><rect width="180" height="92" rx="20" class="node"/><text x="24" y="34" class="h">1. Plan</text><text x="24" y="61" class="s">meat + weight</text><text x="24" y="80" class="s">ready-to-serve time</text></g>
<g transform="translate(310 116)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">2. Pre-flight</text><text x="24" y="61" class="s">probe, bounds, max</text><text x="24" y="80" class="s">cook-time warnings</text></g>
<g transform="translate(610 116)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">3. Preheat</text><text x="24" y="61" class="s">calculated pit</text><text x="24" y="80" class="s">setpoint clamp</text></g>
<g transform="translate(850 250)"><rect width="180" height="92" rx="20" class="node"/><text x="24" y="34" class="h">4. Meat on</text><text x="24" y="61" class="s">probe-temp drop</text><text x="24" y="80" class="s">or manual override</text></g>
<g transform="translate(610 420)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">5. Control</text><text x="24" y="61" class="s">actual vs expected</text><text x="24" y="80" class="s">rate-limited nudges</text></g>
<g transform="translate(310 420)"><rect width="190" height="92" rx="20" class="node"/><text x="24" y="34" class="h">6. Pull</text><text x="24" y="61" class="s">notify at pull temp</text><text x="24" y="80" class="s">never auto-off</text></g>

<g transform="translate(392 238)"><rect width="315" height="140" rx="24" fill="#08130f" stroke="#31543a"/><text x="25" y="35" class="h">Projection curve</text><path d="M26 108 C83 111 105 90 142 83 S201 70 285 35" fill="none" stroke="#86efac" stroke-width="5" opacity=".22"/><path class="curve" d="M26 108 C83 111 105 90 142 83 S201 70 285 35" fill="none" stroke="#86efac" stroke-width="4" stroke-linecap="round"/><circle cx="142" cy="83" r="7" fill="#f97316"/><text x="25" y="128" class="s">Food actual tracks expected over time</text></g>
</svg>
