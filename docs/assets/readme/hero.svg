<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Green Mountain Grills Home Assistant animated hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06130b"/><stop offset=".48" stop-color="#10251a"/><stop offset="1" stop-color="#2b1307"/></linearGradient>
    <radialGradient id="ember" cx="72%" cy="70%" r="55%"><stop offset="0" stop-color="#f97316" stop-opacity=".46"/><stop offset=".48" stop-color="#22c55e" stop-opacity=".13"/><stop offset="1" stop-color="#000" stop-opacity="0"/></radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#172218"/><stop offset=".55" stop-color="#0b1110"/><stop offset="1" stop-color="#26332d"/></linearGradient>
    <linearGradient id="lid" x1="0" x2="1"><stop offset="0" stop-color="#0f1f16"/><stop offset=".5" stop-color="#1f3a23"/><stop offset="1" stop-color="#0f1f16"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".45"/></filter>
    <style>
      .kicker{font:800 18px Inter,Segoe UI,Arial,sans-serif;fill:#86efac;letter-spacing:.21em}.title{font:900 58px Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc}.sub{font:600 23px Inter,Segoe UI,Arial,sans-serif;fill:#dcfce7}.chip{font:800 15px Inter,Segoe UI,Arial,sans-serif;fill:#ecfdf5}.hud{font:900 17px Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc}.tiny{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#bbf7d0}.smoke{animation:smoke 5.2s ease-in-out infinite;transform-origin:center}.smoke2{animation:smoke 6.4s ease-in-out 1s infinite;transform-origin:center}.smoke3{animation:smoke 7.2s ease-in-out 2s infinite;transform-origin:center}.flame{animation:flicker .85s ease-in-out infinite alternate;transform-origin:50% 85%;transform-box:fill-box}.wifi{animation:pulse 2s ease-out infinite}.wifi2{animation:pulse 2s ease-out .5s infinite}.wifi3{animation:pulse 2s ease-out 1s infinite}.dash{stroke-dasharray:16 13;animation:dash 1.6s linear infinite}.packet{animation:packet 4.4s linear infinite}.chart{stroke-dasharray:420;stroke-dashoffset:420;animation:draw 4s ease-in-out infinite}.tempbar{animation:bar 1.6s ease-in-out infinite;transform-origin:50% 100%;transform-box:fill-box}@keyframes smoke{0%{opacity:0;transform:translateY(24px) scale(.65)}20%{opacity:.55}100%{opacity:0;transform:translateY(-78px) translateX(24px) scale(1.55)}}@keyframes flicker{from{transform:scaleY(.82) rotate(-2deg);opacity:.72}to{transform:scaleY(1.15) rotate(2deg);opacity:1}}@keyframes pulse{0%{opacity:.8;transform:scale(.92)}100%{opacity:0;transform:scale(1.35)}}@keyframes dash{to{stroke-dashoffset:-58}}@keyframes packet{0%{transform:translateX(0);opacity:0}8%,80%{opacity:1}100%{transform:translateX(250px);opacity:0}}@keyframes draw{0%{stroke-dashoffset:420}45%,70%{stroke-dashoffset:0}100%{stroke-dashoffset:-420}}@keyframes bar{50%{transform:scaleY(.35)}}
    </style>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/><rect width="1200" height="420" rx="34" fill="url(#ember)"/>
