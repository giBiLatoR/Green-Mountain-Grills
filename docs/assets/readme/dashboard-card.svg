<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580" role="img" aria-label="GMG smoker dashboard mockup">
<style>.title{font:900 30px Inter,Segoe UI,Arial;fill:#f8fafc}.h{font:900 18px Inter,Segoe UI,Arial;fill:#f8fafc}.s{font:600 14px Inter,Segoe UI,Arial;fill:#cbd5e1}.card{fill:#0f172a;stroke:#26364f;stroke-width:2}.glow{animation:glow 1.6s ease-in-out infinite alternate}.fan{animation:spin 2.2s linear infinite;transform-origin:782px 165px}.line{stroke-dasharray:430;animation:draw 4.5s ease-in-out infinite}@keyframes glow{from{filter:drop-shadow(0 0 6px #f97316)}to{filter:drop-shadow(0 0 24px #ef4444)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes draw{0%{stroke-dashoffset:430}55%,80%{stroke-dashoffset:0}100%{stroke-dashoffset:-430}}</style>
