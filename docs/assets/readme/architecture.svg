<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Green Mountain Grills integration architecture">
<style>.box{fill:#0f1f16;stroke:#31543a;stroke-width:2}.title{font:900 34px Inter,Segoe UI,Arial;fill:#f8fafc}.h{font:900 20px Inter,Segoe UI,Arial;fill:#86efac}.s{font:600 15px Inter,Segoe UI,Arial;fill:#d1fae5}.arrow{stroke:#22c55e;stroke-width:5;fill:none;marker-end:url(#m);stroke-dasharray:13 10;animation:flow 1.6s linear infinite}.warn{fill:#7c2d12;stroke:#fdba74}@keyframes flow{to{stroke-dashoffset:-46}}</style>
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#04110a"/><stop offset="1" stop-color="#1f1308"/></linearGradient><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker></defs>
<rect width="1100" height="560" rx="30" fill="url(#g)"/><text x="48" y="62" class="title">Architecture: local-first smoker control</text><text x="50" y="91" class="s">Home Assistant talks directly to the grill over LAN UDP. Auto-Cook sits above the core integration and stores cook sessions locally.</text>
<rect x="55" y="130" width="260" height="275" rx="22" class="box"/><text x="85" y="172" class="h">Home Assistant</text><text x="85" y="207" class="s">Config flow + options flow</text><text x="85" y="234" class="s">GMG Smoker card/strategy</text><text x="85" y="261" class="s">Climate, sensors, numbers</text><text x="85" y="288" class="s">Buttons + domain services</text><text x="85" y="332" class="s">Unit preferences + registry</text>
<rect x="420" y="130" width="260" height="275" rx="22" class="box"/><text x="450" y="172" class="h">GMG integration</text><text x="450" y="207" class="s">GMGCoordinator polling loop</text><text x="450" y="234" class="s">GMGClient command facade</text><text x="450" y="261" class="s">Protocol parser / encoder</text><text x="450" y="288" class="s">Auto-Cook controller</text><text x="450" y="332" class="s">SQLite cook sessions</text>
<rect x="785" y="130" width="260" height="275" rx="22" class="box"/><text x="815" y="172" class="h">GMG WiFi controller</text><text x="815" y="207" class="s">Local mode only</text><text x="815" y="234" class="s">UDP port 8080</text><text x="815" y="261" class="s">UR001! status frames</text><text x="815" y="288" class="s">UT###! setpoint writes</text><text x="815" y="332" class="s">No cloud or vendor login</text>
<path class="arrow" d="M315 250H414"/><path class="arrow" d="M680 250H779"/><path class="arrow" d="M785 303H686"/><path class="arrow" d="M420 303H321"/>
<rect x="205" y="440" width="690" height="64" rx="20" class="warn" opacity=".74"/><text x="235" y="467" class="h" fill="#fed7aa">Safety boundary</text><text x="235" y="491" class="s">Auto-Cook may adjust pit setpoints, but never powers the grill off by itself. Live fire still requires supervision.</text>
</svg>
