<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-label="Auto-Cook safety guardrails">
<style>.title{font:900 31px Inter,Segoe UI,Arial;fill:#fff7ed}.h{font:900 18px Inter,Segoe UI,Arial;fill:#fed7aa}.s{font:600 14px Inter,Segoe UI,Arial;fill:#ffedd5}.card{fill:#281407;stroke:#fdba74;stroke-width:2}.pulse{animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{50%{opacity:.38}}</style>
<rect width="980" height="360" rx="30" fill="#190b05"/><text x="44" y="58" class="title">Live-fire guardrails</text><text x="46" y="86" class="s">Auto-Cook is experimental. It can write grill setpoints; you still supervise the cook.</text>
<g transform="translate(55 125)"><rect class="card" width="270" height="150" rx="22"/><text x="24" y="42" class="h">375°F default cap</text><text x="24" y="74" class="s">Manual and Auto-Cook writes are</text><text x="24" y="98" class="s">bounded by the configured ceiling.</text><circle cx="235" cy="38" r="9" fill="#fb923c" class="pulse"/></g>
<g transform="translate(355 125)"><rect class="card" width="270" height="150" rx="22"/><text x="24" y="42" class="h">Rate-limited nudges</text><text x="24" y="74" class="s">At most small setpoint changes,</text><text x="24" y="98" class="s">with cooldowns to prevent hunting.</text><circle cx="235" cy="38" r="9" fill="#fb923c" class="pulse"/></g>
<g transform="translate(655 125)"><rect class="card" width="270" height="150" rx="22"/><text x="24" y="42" class="h">Never auto-off</text><text x="24" y="74" class="s">The controller notifies at pull temp,</text><text x="24" y="98" class="s">but does not shut down live fire.</text><circle cx="235" cy="38" r="9" fill="#fb923c" class="pulse"/></g>
<text x="56" y="320" class="s">Modes: Autonomous writes setpoints, Set &amp; Forget writes only the starting target, Coach only advises.</text>
</svg>
